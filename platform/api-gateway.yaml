spring:


  cloud:
    gateway:
      webflux:
        routes:
          - id: book-server
            uri: lb://BOOK-SERVICE
            predicates:
              - path=/api/v1/books/**

          - id: user-server
            uri: lb://USER-SERVICE
            predicates:
              - path=/api/v1/users/**

          - id: lending-server
            uri: lb://LENDING-SERVICE
            predicates:
              - path=/api/v1/lendings/**

        default-filters:
          - PreserveHostHeader

        globalcors:
          cors-configurations:
            allowOrigins: "*"
            allow-methods: "*"
            allow-headers: "*"

server:
  port: 7000
